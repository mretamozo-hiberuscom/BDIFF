    summary: "Direct pyodbc + INFORMATION_SCHEMA extraction recommended; snapshot tables and requested column metadata only."
    key_decisions:
      - "Use qualified table identity to prevent cross-schema collisions."
      - "Translate driver failures using profile-safe messages; never expose ODBC text."
  proposal:
    status: done
    artifact: "openspec/changes/schema-extraction/proposal.md"
    summary: "New schema-extraction capability: read-only pyodbc INFORMATION_SCHEMA snapshots with qualified table identity and safe errors."
    key_decisions:
      - "Use direct pyodbc and INFORMATION_SCHEMA for this metadata slice."
      - "Keep all extraction in-memory and exclude comparison, UI, reports, and writes."
  spec:
    status: done
    artifacts:
      - "openspec/changes/schema-extraction/specs/schema-extraction/spec.md"
    summary: "Full schema-extraction spec: normalized metadata, qualified identity, deterministic order, read-only safety, and database-free unit verification."
    key_decisions:
      - "Tables use schema plus table name as their identity."
      - "Snapshot ordering is deterministic by table identity and column ordinal."
      - "Driver failures are translated without exposing connection or infrastructure details."
  clarify:
    status: done
    questions_asked: 1
    summary: "Resolved timeout enforcement ambiguity: explicit ~30s timeout on connection and catalog query, translated via existing network/connectivity error category (REQ-schema-extraction-005)."
  design:
    status: done
    artifact: "openspec/changes/schema-extraction/design.md"
    summary: "connectors/ owns the sole pyodbc.connect boundary and the shared ~30s login+query timeout; discovery/ owns the single INFORMATION_SCHEMA JOIN query, qualified-identity grouping, deterministic sort, and connect/query error translation into DriverUnavailableError/ConnectionFailedError/MetadataAccessError."
    key_decisions:
      - "Single INFORMATION_SCHEMA.COLUMNS JOIN TABLES query (WHERE TABLE_TYPE='BASE TABLE') instead of two separate queries."
      - "Ordering enforced in Python at snapshot-build time (schema+table, then ordinal+name), not relied upon from SQL."
      - "One DEFAULT_TIMEOUT_SECONDS constant applied via pyodbc.connect(timeout=) for login and connection.timeout for the catalog query; both expiries translate to ConnectionFailedError."
      - "Hand-written FakeConnection/FakeCursor test doubles (not autospec) injected via a connect_fn seam, since pyodbc C-extension types don't autospec cleanly."
  tasks:
    status: done
    artifact: "openspec/changes/schema-extraction/tasks.md"
    summary: "6-phase breakdown (models/dependency, connectors boundary, catalog query/normalization, error translation/service, unit tests, verification). All 6 MUST requirements covered-by-design; no blockers."
    key_decisions:
      - "Single PR delivery under accepted size:exception (delivery_strategy exception-ok); ~550-650 estimated changed lines, Medium 400-line budget risk."
      - "Suggested work units map to design's connectors/discovery module split for reviewer navigation, without requiring chained PRs."
