      - "Fail loudly on provisioning failure, no partial ready state (Decision 3)"
      - "Relaunch via subprocess.run, not os.exec* (Decision 4)"
      - "Pure-function/orchestration testability split (Decision 5)"
      - "Out of scope: console-scripts entry point, uv/pipx as primary, dependency-drift detection, frozen binary, OS-specific launchers"
